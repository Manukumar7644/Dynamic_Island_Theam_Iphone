<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Island iPhone-14</title>
    <link rel="stylesheet" href="Style.css" />
    <script
      src="https://kit.fontawesome.com/53f7df5ba9.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="display">
      <div class="iphone">
        <img src="media/iphone14.png" alt="" />

        <div class="overlay">
          <div class="dynamic">
            <div class="profile">
              <img src="media/Call.png" alt="" />
            </div>
            <div class="profile_name">Manu Soni</div>
            <div class="call-attend">
              <i class="fa-solid fa-phone"></i>
            </div>
            <div class="call-hangup">
              <i class="fa-solid fa-phone-slash"></i>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
